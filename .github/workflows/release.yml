name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-15, windows-latest, ubuntu-22.04]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set Node.js memory limit (macOS)
        if: matrix.platform == 'macos-15'
        run: |
          echo "NODE_OPTIONS<<EOF" >> $GITHUB_ENV
          echo "--max-old-space-size=6144" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Set Node.js memory limit (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "NODE_OPTIONS<<EOF" >> $GITHUB_ENV
          echo "--max-old-space-size=4096" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Set Node.js memory limit (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          @"
          NODE_OPTIONS<<EOF
          --max-old-space-size=4096
          EOF
          "@ | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Set version from tag (Linux/macOS)
        if: matrix.platform != 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Setting version to $VERSION"
          cd src-tauri
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" tauri.conf.json
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f tauri.conf.json.bak Cargo.toml.bak
          cat tauri.conf.json | grep version
          cat Cargo.toml | grep "^version"
          cd ..
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          rm -f package.json.bak
          cat package.json | grep '"version"'

      - name: Set version from tag (Windows)
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          echo "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Setting version to $VERSION"
          cd src-tauri
          $content = Get-Content tauri.conf.json -Raw
          $content = $content -replace '"version": "[^"]*"', "`"version`": `"$VERSION`""
          Set-Content tauri.conf.json $content -NoNewline -Encoding utf8
          Get-Content tauri.conf.json | Select-String version
          $cargoContent = Get-Content Cargo.toml -Raw
          $cargoContent = $cargoContent -replace '^version = "[^"]*"', "version = `"$VERSION`""
          Set-Content Cargo.toml $cargoContent -NoNewline -Encoding utf8
          Get-Content Cargo.toml | Select-String "^version"
          cd ..
          $pkgContent = Get-Content package.json -Raw
          $pkgContent = $pkgContent -replace '"version": "[^"]*"', "`"version`": `"$VERSION`""
          Set-Content package.json $pkgContent -NoNewline -Encoding utf8
          Get-Content package.json | Select-String '"version"'

      - name: Build (macOS)
        if: matrix.platform == 'macos-15'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          npm run build
          npx tauri build --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install nsis -y
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          echo "NSIS_PATH=C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          rustup target add x86_64-pc-windows-msvc
          npm run build
          npx tauri build --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename MSI to remove locale (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $msiFiles = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi" -Filter "*.msi" -Recurse
          foreach ($file in $msiFiles) {
            $newName = $file.Name -replace '_en-US\.msi$', '.msi'
            if ($file.Name -ne $newName) {
              Rename-Item -Path $file.FullName -NewName $newName
              Write-Host "Renamed: $($file.Name) -> $newName"
            }
          }

      - name: Build (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
          npm run build
          npx tauri build --target x86_64-unknown-linux-gnu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SwallowNote-build-${{ matrix.platform }}
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          find artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \)

      - name: Generate Release Body
        id: release_body
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --oneline --format='  - %s' 2>/dev/null | head -50 || echo "  - 无更新内容")
          else
            CHANGELOG=$(git log --oneline --format='  - %s' 2>/dev/null | head -20 || echo "  - 无更新内容")
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="  - 无更新内容"
          fi

          {
            echo "### 更新内容"
            echo "$CHANGELOG"
            echo ""
            echo "### 下载"
            echo "  - **macOS**: SwallowNote-*-universal.dmg"
            echo "  - **Windows**: SwallowNote-*-x64-setup.exe"
            echo "  - **Linux**: SwallowNote-*-x86_64.AppImage 或 .deb"
            echo ""
            echo "### 安装说明"
            echo "  - **macOS**: 下载 DMG 文件，将 SwallowNote.app 拖入 Applications 文件夹"
            echo "  - **Windows**: 下载 exe 文件，双击运行安装程序"
            echo "  - **Linux**: 下载 AppImage 并运行，或使用 dpkg -i 安装 deb 包"
            echo ""
            echo "### 系统要求"
            echo "  - macOS 13.0 或更高版本"
            echo "  - Windows 10 或更高版本"
            echo "  - Linux (Ubuntu 20.04+, Fedora 34+, etc.)"
          } > release_body.txt

          cat release_body.txt

      - name: Delete Existing Release Assets
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Deleting existing assets for tag: $TAG_NAME"
          ASSETS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/Qithking/SwallowNote/releases/tags/$TAG_NAME" | jq -r '.assets // [] | .[] | .id')
          if [ -z "$ASSETS" ]; then
            echo "No existing assets to delete"
          else
            for ASSET_ID in $ASSETS; do
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/Qithking/SwallowNote/releases/assets/$ASSET_ID"
              echo "Deleted asset: $ASSET_ID"
            done
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.txt
          files: |
            artifacts/**/SwallowNote_*.dmg
            artifacts/**/SwallowNote_*.msi
            artifacts/**/SwallowNote_*.exe
            artifacts/**/SwallowNote_*.deb
            artifacts/**/SwallowNote_*.AppImage
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}